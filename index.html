<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sua Notícia 365 | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #cc0000; 
            --primary-dark: #990000;
            --accent: #1e293b;
            
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-meta: #64748b;
            --border: #e2e8f0;
            --surface: #f1f5f9;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
            
            --icon-like: #e11d48;
            --icon-save: #0284c7;
            --icon-share: #10b981;
        }

        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-meta: #94a3b8;
            --border: #334155;
            --surface: #0f172a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 20px; transition: background 0.3s, color 0.3s; font-size: 15px; scroll-behavior: smooth; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* HEADER PREMIUM */
        .navbar { position: sticky; top: 0; background: var(--primary); color: white; z-index: 1000; box-shadow: 0 4px 12px rgba(204,0,0,0.2); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 12px 20px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { background: none; border: none; font-size: 1.3rem; color: white; cursor: pointer; }
        .logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.4rem; color: white; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        
        .theme-btn-top { background: rgba(0,0,0,0.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .theme-btn-top:hover { background: rgba(0,0,0,0.4); }

        .breaking-bar { background: var(--accent); color: white; padding: 8px 20px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; overflow: hidden; white-space: nowrap; }
        .breaking-text { animation: scrollLeft 25s linear infinite; display: inline-block; padding-left: 100%; }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* MENU LATERAL */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1999; display: none; opacity: 0; transition: 0.3s; }
        .sidebar-overlay.open { display: block; opacity: 1; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: var(--card); z-index: 2000; transition: left 0.3s ease; padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-close { background: none; border: none; font-size: 1.4rem; color: var(--text); cursor: pointer; align-self: flex-end; }
        
        .sidebar h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; cursor: pointer;}
        .side-btn { display: flex; align-items: center; gap: 12px; width: 100%; background: none; border: none; color: var(--text); padding: 12px 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; border-radius: 6px; transition: 0.2s; text-align: left; }
        .side-btn:hover, .side-btn.active { background: var(--surface); color: var(--primary); }
        .side-btn i { width: 18px; text-align: center; font-size: 1.1rem; }
        
        .i-dark { color: #475569; }
        .i-saved { color: var(--icon-save); }
        .i-new { color: #f59e0b; }
        
        .sidebar-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-meta); line-height: 1.5; }
        .contact-link { color: var(--text); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .contact-link i { color: var(--primary); }

        /* PESQUISA E CATEGORIAS */
        .controls-container { max-width: 1200px; margin: 15px auto; padding: 0 20px; }
        .search-box { position: relative; margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit; font-size: 0.95rem; box-shadow: var(--shadow); outline: none; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-meta); font-size: 0.9rem; }
        
        .categories { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; } /* Esconde a scrollbar das categorias */
        .cat-item { padding: 6px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; font-size: 0.85rem; font-weight: 700; white-space: nowrap; cursor: pointer; color: var(--text-meta); text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        .news-card { background: var(--card); border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; cursor: pointer; box-shadow: var(--shadow); transition: 0.2s; }

        .news-title { font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); }
        .news-meta { font-size: 0.75rem; color: var(--text-meta); margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-weight: 500; border-top: 1px solid var(--border); padding-top: 10px; }

        /* VISTA DE LEITURA */
        #article-view { display: none; background: var(--card); min-height: 100vh; padding-bottom: 50px; }
        .article-header { position: sticky; top: 0; background: var(--card); padding: 12px 20px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; align-items: center; box-shadow: var(--shadow); }
        .back-btn { background: none; border: none; font-size: 0.95rem; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: inherit; text-transform: uppercase; transition: color 0.2s; }
        .back-btn:hover { color: var(--primary); }
        
        .article-container { max-width: 700px; margin: 20px auto 0; padding: 0 20px; }
        .article-tag { display: inline-block; background: var(--primary); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
        .article-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; line-height: 1.25; margin-bottom: 20px; color: var(--text); }
        
        .btn-action-row { display: flex; gap: 10px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .btn-action { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-weight: 700; cursor: pointer; background: var(--surface); color: var(--text); font-family: inherit; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-action i { font-size: 1rem; }
        
        .btn-action.like-btn i { color: var(--icon-like); }
        .btn-action.like-btn.liked { background: rgba(225, 29, 72, 0.1); border-color: var(--icon-like); color: var(--icon-like); }
        
        .btn-action.save-btn i { color: var(--icon-save); }
        .btn-action.save-btn.saved { background: rgba(2, 132, 199, 0.1); border-color: var(--icon-save); color: var(--icon-save); }
        
        .article-main-img { width: 100%; border-radius: 6px; margin-bottom: 25px; object-fit: cover; max-height: 400px; }
        .article-content { font-size: 1rem; line-height: 1.7; color: var(--text); }
        .article-content p { margin-bottom: 1.5rem; }
        .article-content img { max-width: 100%; height: auto; border-radius: 6px; margin: 20px 0; }
        
        .related-section { margin-top: 40px; padding-top: 30px; border-top: 4px solid var(--border); }
        .related-section h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; color: var(--primary); }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .related-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
        .related-card:hover { border-color: var(--primary); }
        .related-card img { width: 100%; height: 100px; object-fit: cover; }
        .related-card h4 { padding: 10px; font-size: 0.85rem; line-height: 1.3; font-weight: 600; color: var(--text); }

        /* BOTÕES FLUTUANTES */
        .floating-nav { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1001; opacity: 0; pointer-events: none; transition: 0.3s; }
        .floating-nav.visible { opacity: 1; pointer-events: auto; }
        .float-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .float-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
        .float-btn.share { background: var(--icon-share); }
        .float-btn.share:hover { background: #059669; }

        .loader { text-align: center; padding: 40px; grid-column: 1/-1; color: var(--primary); font-size: 1.5rem; }
    </style>
</head>

<script>
window.addEventListener('scroll', () => {
    const floatNav = document.getElementById('floating-nav');
    if (window.scrollY > 200) { floatNav.classList.add('visible'); } 
    else { floatNav.classList.remove('visible'); }

const SOURCES = [
    { name: "O País", api: "https://opais.co.mz/wp-json/wp/v2/posts?_embed", slug: "opais" },
    { name: "Carta de MZ", api: "https://cartamz.com/wp-json/wp/v2/posts?_embed", slug: "carta" },
    { name: "MZ News", api: "https://mznews.co.mz/wp-json/wp/v2/posts?_embed", slug: "mznews" },
    { name: "Folha de Maputo", api: "https://www.folhademaputo.co.mz/wp-json/wp/v2/posts?_embed", slug: "folha" },
    { name: "Evidências", api: "https://evidencias.co.mz/wp-json/wp/v2/posts?_embed", slug: "evidencias" },
    { name: "Integrity Mag", api: "https://integritymagazine.co.mz/wp-json/wp/v2/posts?_embed", slug: "integrity" },
    { name: "Savana", api: "https://savana.co.mz/wp-json/wp/v2/posts?_embed", slug: "savana" },
    { name: "Ngani", api: "https://ngani.co.mz/wp-json/wp/v2/posts?_embed", slug: "ngani" },
    { name: "AIM News", api: "https://aimnews.org/wp-json/wp/v2/posts?_embed", slug: "aim" },
    { name: "Jornal Ikweli", api: "https://ikweli.co.mz/wp-json/wp/v2/posts?_embed", slug: "ikweli" },
    { name: "Zumbo FM", api: "https://zumbofm.com/wp-json/wp/v2/posts?_embed", slug: "zumbo" },
    { name: "Moz24h", api: "https://moz24h.co.mz/wp-json/wp/v2/posts?_embed", slug: "moz24h" },
    { name: "Jornal Domingo", api: "https://www.jornaldomingo.co.mz/wp-json/wp/v2/posts?_embed", slug: "domingo" },
    { name: "Jornal Desafio", api: "https://www.jornaldesafio.co.mz/wp-json/wp/v2/posts?_embed", slug: "desafio" },
    { name: "Jornal Notícias", api: "https://www.jornalnoticias.co.mz/wp-json/wp/v2/posts?_embed", slug: "noticias" },
    { name: "Dossiers e Factos", api: "https://dossiersefactos.com/wp-json/wp/v2/posts?_embed", slug: "dossiers" },
    { name: "Diário Económico", api: "https://www.diarioeconomico.co.mz/wp-json/wp/v2/posts?_embed", slug: "diario" },
    { name: "O Económico", api: "https://www.oeconomico.com/wp-json/wp/v2/posts?_embed", slug: "oeconomico" },
    { name: "CIP Moz", api: "https://www.cipmoz.org/wp-json/wp/v2/posts?_embed", slug: "cip" },
    { name: "CDD Moz", api: "https://cddmoz.org/wp-json/wp/v2/posts?_embed", slug: "cdd" },
    { name: "O Destaque", api: "https://odestaque.co.mz/wp-json/wp/v2/posts?_embed", slug: "destaque" },
    { name: "Canal Moz", api: "https://canal.co.mz/wp-json/wp/v2/posts?_embed", slug: "canal" },
    { name: "Moz Times", api: "https://moztimes.com/wp-json/wp/v2/posts?_embed", slug: "moztimes" },
    { name: "Rádio Moçambique", api: "https://www.rm.co.mz/wp-json/wp/v2/posts?_embed", slug: "rm" },
    { name: "Miramar", api: "https://miramar.co.mz/wp-json/wp/v2/posts?_embed", slug: "miramar" },
    { name: "DW Moçambique", api: "https://www.dw.com/wp-json/wp/v2/posts?_embed", slug: "dw" },
    { name: "Times de Todos", api: "https://www.timesdetodos.com/wp-json/wp/v2/posts?_embed", slug: "timesdetodos" }
];

let allPosts = [], currentPage = 1, isFetching = false, currentCat = '', isSavedView = false, sortOrder = 'new';
let currentReadingPost = null;
let savedScrollPosition = 0;

// GESTÃO DO HISTÓRICO (BOTÃO VOLTAR INTELIGENTE)
window.addEventListener('popstate', (e) => {
    if (e.state && e.state.view === 'article') {
        const post = allPosts.find(p => p.uniqueId === e.state.articleId);
        if (post) openArticleView(post, false);
    } else {
        closeArticleView(false);
    }
});

function goHome() {
    if(currentReadingPost) { goBack(); } 
    else { window.scrollTo({top:0, behavior: 'smooth'}); location.reload(); }
}

function goBack() { history.back(); }

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
}

function toggleTheme() {
    const isDark = document.body.classList.toggle('dark-mode');
    document.getElementById('theme-icon-top').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}

function setSort(order) {
    sortOrder = order;
    document.getElementById('btn-sort-new').classList.toggle('active', order === 'new');
    document.getElementById('btn-sort-old').classList.toggle('active', order === 'old');
    toggleSidebar(); 
    document.getElementById('feed').innerHTML = ''; // Limpa para reordenar
    renderFeed();
}

// EVITA O CONGELAMENTO SE UM JORNAL ESTIVER LENTO (Timeout de 8 segundos)
async function fetchWithTimeout(resource, options = {}) {
    const { timeout = 8000 } = options;
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    const response = await fetch(resource, { ...options, signal: controller.signal });
    clearTimeout(id);
    return response;
}

// MOTOR ASSÍNCRONO ULTRA-RÁPIDO E SEM BUGS VISUAIS
function loadNews() {
    if (isFetching || isSavedView) return;
    isFetching = true;
    let fetchesCompleted = 0;
    
    const query = currentCat || document.getElementById('search-input').value;

    SOURCES.forEach(async (src) => {
        try {
            let url = `${src.api}&per_page=5&page=${currentPage}`;
            if (query) url += `&search=${encodeURIComponent(query)}`;
            
            const res = await fetchWithTimeout(url);
            if (!res.ok) throw new Error('Bloqueio');
            const data = await res.json();
            
            let added = false;
            data.forEach(p => {
                const uniqueId = `${src.slug}-${p.id}`;
                if(!allPosts.some(oldP => oldP.uniqueId === uniqueId)) { 
                    
                    // PROCURA AVANÇADA DE IMAGENS (Evita notícias sem foto)
                    let imgFinal = p._embedded?.['wp:featuredmedia']?.[0]?.source_url 
                                || p.jetpack_featured_media_url 
                                || p?.yoast_head_json?.og_image?.[0]?.url 
                                || 'https://via.placeholder.com/400x200?text=Sua+Notícia+365';

                    allPosts.push({
                        uniqueId: uniqueId, 
                        apiId: p.id,
                        title: p.title.rendered, 
                        date: p.date, 
                        srcName: src.name, 
                        srcSlug: src.slug,
                        apiBase: src.api.split('?')[0],
                        link: p.link, 
                        img: imgFinal,
                        // GUARDA O TEXTO DA NOTÍCIA PARA ABERTURA INSTANTÂNEA
                        contentLoaded: p.content?.rendered || "<p>O conteúdo completo desta notícia precisa ser lido no site oficial.</p>"
                    });
                    added = true;
                }
            });
            
            if (added) {
                renderFeed(); // Apenas acrescenta, não apaga a tela!
                updateTicker();
            }

        } catch (e) { 
            // Ignora jornais lentos ou falhados silenciosamente
        } finally {
            fetchesCompleted++;
            if(fetchesCompleted === SOURCES.length) {
                isFetching = false;
                currentPage++;
            }
        }
    });
}

function updateTicker() {
    if(allPosts.length > 0) {
        let tempPosts = [...allPosts].sort((a, b) => new Date(b.date) - new Date(a.date));
        const top5 = tempPosts.slice(0, 5).map(p => p.title).join(" &nbsp; • &nbsp; ");
        document.getElementById('breaking-ticker').innerHTML = top5;
    }
}

// DESENHO SUAVE NO ECRÃ
function renderFeed() {
    const feed = document.getElementById('feed');
    let displayList = isSavedView ? JSON.parse(localStorage.getItem('premium_news_saved') || '[]') : [...allPosts];
    
    if(currentCat && !isSavedView) {
        const catLower = currentCat.toLowerCase();
        displayList = displayList.filter(p => p.title.toLowerCase().includes(catLower) || p.srcName.toLowerCase().includes(catLower));
    }
    
    if(sortOrder === 'new') { displayList.sort((a, b) => new Date(b.date) - new Date(a.date)); } 
    else { displayList.sort((a, b) => new Date(a.date) - new Date(b.date)); }
    
    // Só desenha as notícias novas que chegaram, não pisca o ecrã
    displayList.forEach(p => {
        if (!document.getElementById(`card-${p.uniqueId}`)) {
            const card = document.createElement('div');
            card.id = `card-${p.uniqueId}`;
            card.className = 'news-card';
            card.onclick = () => openArticle(p);
            card.innerHTML = `
                <img class="news-img" src="${p.img}" loading="lazy">
                <div class="news-body">
                    <span class="news-tag">${p.srcName}</span>
                    <h3 class="news-title">${p.title}</h3>
                    <div class="news-meta">
                        <span><i class="far fa-clock"></i> ${new Date(p.date).toLocaleDateString('pt-MZ')}</span>
                        <i class="fas fa-chevron-right" style="color:var(--primary); font-size: 0.7rem;"></i>
                    </div>
                </div>`;
            feed.appendChild(card);
        }
    });
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    
    currentCat = cat; 
    isSavedView = false;
    
    document.getElementById('feed').innerHTML = ''; // Limpa a tela na mudança de categoria
    renderFeed(); // Renderiza instantaneamente o cache
    
    currentPage = 1; 
    loadNews();
}

function toggleSavedView() {
    isSavedView = !isSavedView;
    document.getElementById('sidebar-saved-btn').classList.toggle('active', isSavedView);
    document.getElementById('scroll-anchor').style.display = isSavedView ? 'none' : 'block';
    toggleSidebar();
    
    if(isSavedView && currentReadingPost) {
        history.pushState(null, "", window.location.pathname);
        closeArticleView(false);
    }
    document.getElementById('feed').innerHTML = '';
    renderFeed();
}

function resetAndLoad() { 
    document.getElementById('feed').innerHTML = '';
    allPosts = []; currentPage = 1; loadNews(); 
}

function openArticle(post) {
    if(!currentReadingPost) { savedScrollPosition = window.scrollY; }
    openArticleView(post, true);
}

// ABERTURA INSTANTÂNEA E LINK PARA PARTILHA
async function openArticleView(post, pushHistory = true) {
    currentReadingPost = post;
    
    // Atualiza o link do site para a pessoa partilhar direto
    if(pushHistory) {
        history.pushState({ view: 'article', articleId: post.uniqueId }, "", "?article=" + post.uniqueId);
    }
    
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('article-view').style.display = 'block';
    window.scrollTo(0, 0);

    document.getElementById('source-tag').innerText = post.srcName;
    document.getElementById('article-title').innerHTML = post.title;
    
    const img = document.getElementById('feat-img');
    if (post.img && !post.img.includes('placeholder')) {
        img.src = post.img; img.style.display = 'block';
    } else { img.style.display = 'none'; }

    updateActionBtns();
    renderRelatedPosts(post);

    const contentDiv = document.getElementById('article-content');
    
    // O texto entra em zero segundos porque já foi baixado em background!
    let finalContent = post.contentLoaded + 
    `<br><br><a href="${post.link}" target="_blank" style="display: block; margin-top: 20px; font-weight: 800; color: var(--primary); text-decoration: none; padding-top: 20px; border-top: 1px solid var(--border);"><i class="fas fa-external-link-alt"></i> Ler no site oficial aqui</a>`;
    
    contentDiv.innerHTML = finalContent;
}

function closeArticleView(updateHistory = true) {
    document.getElementById('article-view').style.display = 'none';
    document.getElementById('home-view').style.display = 'block';
    document.getElementById('article-content').innerHTML = ''; 
    currentReadingPost = null;
    
    if(updateHistory) { history.pushState({ view: 'home' }, "", window.location.pathname); }
    
    window.scrollTo(0, savedScrollPosition);
}

function toggleSaveArticle() {
    if(!currentReadingPost) return;
    let saved = JSON.parse(localStorage.getItem('premium_news_saved') || '[]');
    const idx = saved.findIndex(x => x.uniqueId === currentReadingPost.uniqueId);
    if(idx > -1) { saved.splice(idx, 1); } 
    else { saved.push(currentReadingPost); }
    localStorage.setItem('premium_news_saved', JSON.stringify(saved));
    updateActionBtns();
}

function toggleLike() {
    if(!currentReadingPost) return;
    let liked = JSON.parse(localStorage.getItem('premium_news_liked') || '[]');
    const idx = liked.findIndex(id => id === currentReadingPost.uniqueId);
    idx > -1 ? liked.splice(idx, 1) : liked.push(currentReadingPost.uniqueId);
    localStorage.setItem('premium_news_liked', JSON.stringify(liked));
    updateActionBtns();
}

function updateActionBtns() {
    if(!currentReadingPost) return;
    const saved = JSON.parse(localStorage.getItem('premium_news_saved') || '[]').some(x => x.uniqueId === currentReadingPost.uniqueId);
    document.getElementById('btn-save').classList.toggle('saved', saved);
    
    const liked = JSON.parse(localStorage.getItem('premium_news_liked') || '[]').includes(currentReadingPost.uniqueId);
    document.getElementById('btn-like').classList.toggle('liked', liked);
}

function shareGlobal() {
    if(!currentReadingPost) return;
    const shareUrl = window.location.origin + window.location.pathname + "?article=" + currentReadingPost.uniqueId;
    
    if (navigator.share) { 
        navigator.share({ 
            title: currentReadingPost.title, 
            text: `Leia esta notícia no Sua Notícia 365: ${currentReadingPost.title}`,
            url: shareUrl 
        }).catch(err => console.log('Partilha cancelada', err));
    } else { 
        navigator.clipboard.writeText(shareUrl);
        alert("Link copiado para partilhar!"); 
    }
}

function renderRelatedPosts(currentPost) {
    const section = document.getElementById('related-section');
    const grid = document.getElementById('related-grid');
    let related = allPosts.filter(p => p.srcSlug === currentPost.srcSlug && p.uniqueId !== currentPost.uniqueId).slice(0, 4);
    
    if(related.length > 0) {
        grid.innerHTML = related.map(p => `
            <div class="related-card" onclick="openArticle({uniqueId: '${p.uniqueId}', title: '${p.title.replace(/'/g, "\\'")}', srcName: '${p.srcName}', img: '${p.img}', apiBase: '${p.apiBase}', apiId: '${p.apiId}', link: '${p.link}', contentLoaded: \`${(p.contentLoaded || '').replace(/`/g, "\\`")}\`})">
                <img src="${p.img}" loading="lazy">
                <h4>${p.title}</h4>
            </div>
        `).join('');
        section.style.display = 'block';
    } else { section.style.display = 'none'; }
}

window.onload = async () => { 
    history.replaceState({ view: 'home' }, "", window.location.pathname + window.location.search);
    
    const urlParams = new URLSearchParams(window.location.search);
    const sharedArticleId = urlParams.get('article');
    
    if(sharedArticleId) {
        const parts = sharedArticleId.split('-');
        const srcSlug = parts[0];
        const apiId = parts.slice(1).join('-');
        const source = SOURCES.find(s => s.slug === srcSlug);
        
        if(source) {
            try {
                const res = await fetch(`${source.api.split('?')[0]}/${apiId}?_embed`);
                const p = await res.json();
                let imgFinal = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || p.jetpack_featured_media_url || p?.yoast_head_json?.og_image?.[0]?.url || 'https://via.placeholder.com/400x200?text=Sua+Notícia+365';
                
                const sharedPost = {
                    uniqueId: sharedArticleId, apiId: p.id, title: p.title.rendered, date: p.date, srcName: source.name, srcSlug: source.slug, apiBase: source.api.split('?')[0], link: p.link, img: imgFinal, contentLoaded: p.content?.rendered || ""
                };
                allPosts.push(sharedPost);
                openArticleView(sharedPost, false); 
            } catch(e) { console.error("Erro ao carregar partilha."); }
        }
    }
    
    const observer = new IntersectionObserver(e => e[0].isIntersecting && loadNews());
    observer.observe(document.getElementById('scroll-anchor')); 
    loadNews(); 
};
</script>
