<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sua Notícia 365 | Premium</title>

    <meta id="og-title" property="og:title" content="Sua Notícia 365 | Portal Premium">
    <meta id="og-image" property="og:image" content="https://via.placeholder.com/1200x630/cc0000/ffffff?text=Sua+Noticia+365">
    <meta id="og-url" property="og:url" content="">
    <meta property="og:description" content="Acompanhe as últimas notícias nacionais e internacionais num só lugar.">
    <meta property="og:type" content="article">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #cc0000; 
            --primary-dark: #990000;
            --accent: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-meta: #64748b;
            --border: #e2e8f0;
            --surface: #f1f5f9;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.08);
            
            --icon-like: #e11d48;
            --icon-save: #0284c7;
        }

        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-meta: #94a3b8;
            --border: #334155;
            --surface: #141e33;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; font-size: 15px; scroll-behavior: smooth; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .fade-in { animation: fadeInAnim 0.4s ease-out forwards; }
        @keyframes fadeInAnim { 0% { opacity: 0; } 100% { opacity: 1; } }
        
        .navbar { position: sticky; top: 0; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; z-index: 1000; box-shadow: 0 2px 10px rgba(204,0,0,0.2); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 15px 20px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { background: none; border: none; font-size: 1.4rem; color: white; cursor: pointer; }
        .logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.4rem; color: white; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        
        .theme-btn-top { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* Sidebar Styles Simplificados */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1999; display: none; opacity: 0; transition: 0.3s; }
        .sidebar-overlay.open { display: block; opacity: 1; }
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: var(--card); z-index: 2000; transition: left 0.3s; padding: 25px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-close { background: none; border: none; font-size: 1.5rem; color: var(--text); cursor: pointer; align-self: flex-end; margin-bottom: 20px; }
        .side-btn { display: flex; align-items: center; gap: 15px; width: 100%; background: none; border: none; color: var(--text); padding: 14px 15px; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 8px; text-align: left; margin-bottom: 8px; }
        .side-btn:hover, .side-btn.active { background: var(--surface); color: var(--primary); }
        .badge { background: var(--surface); color: var(--primary); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; margin-left: auto; font-weight: 800; }

        .controls-container { max-width: 1200px; margin: 15px auto; padding: 0 20px; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 14px 15px 14px 45px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1rem; box-shadow: var(--shadow); outline: none; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-meta); }
        
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { padding: 8px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; font-weight: 700; white-space: nowrap; cursor: pointer; color: var(--text-meta); text-transform: uppercase; transition: 0.2s;}
        .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        .feed { padding: 0 20px 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .news-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; cursor: pointer; box-shadow: var(--shadow); transition: 0.3s; }
        .news-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: #fca5a5; }
        .news-img { width: 100%; height: 220px; object-fit: cover; background: var(--surface); }
        .news-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .news-tags { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .news-tag { color: white; background: var(--primary); padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .news-cat { color: var(--primary); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        
        .news-title { font-size: 1.2rem; font-weight: 800; line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); }
        .news-snippet { font-size: 0.95rem; color: var(--text-meta); line-height: 1.5; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-meta { font-size: 0.8rem; color: var(--text-meta); margin-top: auto; font-weight: 600; border-top: 1px solid var(--border); padding-top: 15px; }

        /* Article View Simplificada */
        #article-view { display: none; background: var(--bg); min-height: 100vh; padding-bottom: 60px; }
        .article-header { position: sticky; top: 0; background: var(--card); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .header-btn { background: var(--surface); border: none; font-size: 0.9rem; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 15px; border-radius: 8px; }
        
        .article-container { max-width: 800px; margin: 30px auto 0; padding: 0 20px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding-top: 30px; box-shadow: var(--shadow); }
        .article-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; line-height: 1.2; margin-bottom: 20px; color: var(--text); }
        
        .btn-action-row { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-weight: 700; cursor: pointer; background: var(--surface); color: var(--text); font-size: 0.95rem; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-action.like-btn.liked { background: rgba(225, 29, 72, 0.1); border-color: var(--icon-like); color: var(--icon-like); }
        .btn-action.save-btn.saved { background: rgba(2, 132, 199, 0.1); border-color: var(--icon-save); color: var(--icon-save); }
        
        .article-main-img { width: 100%; border-radius: 12px; margin-bottom: 30px; object-fit: cover; max-height: 400px; }
        .article-content { font-size: 1.15rem; line-height: 1.8; color: var(--text); }
        .article-content p { margin-bottom: 1.5rem; }
        
        .official-link-box { margin-top: 40px; padding: 30px 20px; background: var(--surface); border-radius: 12px; text-align: center; border: 2px dashed var(--border); margin-bottom: 30px;}
        .official-link-box h4 { font-size: 1.2rem; margin-bottom: 15px; color: var(--text); }
        .read-more-btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; max-width: 400px; background: var(--primary); color: white; font-weight: 800; text-transform: uppercase; padding: 16px; border-radius: 10px; text-decoration: none; font-size: 1rem; box-shadow: 0 4px 15px rgba(204,0,0,0.3); transition: 0.3s; }
        .read-more-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .loader-main { text-align: center; padding: 40px; grid-column: 1/-1; color: var(--text-meta); font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }

        @media (max-width: 600px) {
            .feed { grid-template-columns: 1fr; padding: 0 15px 15px; }
            .article-title { font-size: 1.6rem; }
            .article-container { margin-top: 15px; border-radius: 0; border-left: none; border-right: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    <button class="side-btn active" onclick="goHomeForce()"><i class="fas fa-home"></i> Início</button>
    <button class="side-btn" id="sidebar-saved-btn" onclick="toggleSavedView()">
        <i class="fas fa-bookmark style='color:var(--icon-save)'"></i> Guardados <span class="badge" id="badge-saved">0</span>
    </button>
    <button class="side-btn" id="sidebar-liked-btn" onclick="toggleLikedView()">
        <i class="fas fa-heart style='color:var(--icon-like)'"></i> Favoritos <span class="badge" id="badge-liked">0</span>
    </button>
</div>

<div id="home-view" class="fade-in">
    <nav class="navbar">
        <div class="nav-top">
            <div class="logo-area">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="logo" onclick="goHomeForce()">Sua Notícia 365</div>
            </div>
            <button class="theme-btn-top" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon-top"></i></button>
        </div>
    </nav>
    
    <div class="controls-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Pesquisar notícias..." oninput="localInstantSearch()">
        </div>
        <div class="categories">
            <div class="cat-item active" onclick="filterCat('', this)">Todas</div>
            <div class="cat-item" onclick="filterCat('Política', this)">Política</div>
            <div class="cat-item" onclick="filterCat('Economia', this)">Economia</div>
            <div class="cat-item" onclick="filterCat('Sociedade', this)">Sociedade</div>
            <div class="cat-item" onclick="filterCat('Desporto', this)">Desporto</div>
            <div class="cat-item" onclick="filterCat('Mundo', this)">Mundo</div>
        </div>
    </div>

    <main class="feed" id="feed"></main>
    <div id="scroll-anchor" class="loader-main"><i class="fas fa-spinner fa-spin"></i> A carregar rede suavemente...</div>
</div>

<div id="article-view">
    <div class="article-header">
        <button class="header-btn" onclick="closeArticleView()"><i class="fas fa-arrow-left"></i> Voltar</button>
        <button class="header-btn" onclick="shareGlobal()"><i class="fas fa-share-alt"></i> Partilhar</button>
    </div>

    <main class="article-container" id="article-main-container">
        <div class="news-tags" style="margin-bottom: 20px;">
            <span class="news-tag" id="source-tag">...</span>
            <span class="news-cat" id="cat-tag">...</span>
        </div>
        
        <h1 id="article-title" class="article-title">...</h1>
        
        <div class="btn-action-row">
            <button id="btn-like" class="btn-action like-btn" onclick="toggleLike()"><i class="fas fa-heart"></i> Adorar</button>
            <button id="btn-save" class="btn-action save-btn" onclick="toggleSaveArticle()"><i class="fas fa-bookmark"></i> Guardar</button>
        </div>

        <img id="feat-img" class="article-main-img" src="" style="display:none">
        <div id="article-content" class="article-content"></div>
        
        <div class="official-link-box">
            <h4>Deseja continuar a ler?</h4>
            <p style="color: var(--text-meta); margin-bottom: 20px; font-size: 0.9rem;">Para proteger os seus dados móveis, mostramos apenas o resumo.</p>
            <a href="#" id="official-link-btn" target="_blank" class="read-more-btn">
                <i class="fas fa-external-link-alt"></i> Ler Notícia Completa no Site Oficial
            </a>
        </div>
    </main>
</div>

<script>
const SOURCES = [
    { name: "O País", api: "https://opais.co.mz/wp-json/wp/v2/posts?_embed", slug: "opais" },
    { name: "Carta de MZ", api: "https://cartamz.com/wp-json/wp/v2/posts?_embed", slug: "carta" },
    { name: "Folha de Maputo", api: "https://www.folhademaputo.co.mz/wp-json/wp/v2/posts?_embed", slug: "folha" },
    { name: "Evidências", api: "https://evidencias.co.mz/wp-json/wp/v2/posts?_embed", slug: "evidencias" },
    { name: "Integrity Mag", api: "https://integritymagazine.co.mz/wp-json/wp/v2/posts?_embed", slug: "integrity" },
    { name: "Savana", api: "https://savana.co.mz/wp-json/wp/v2/posts?_embed", slug: "savana" },
    { name: "AIM News", api: "https://aimnews.org/wp-json/wp/v2/posts?_embed", slug: "aim" },
    { name: "Jornal Ikweli", api: "https://ikweli.co.mz/wp-json/wp/v2/posts?_embed", slug: "ikweli" },
    { name: "Zumbo FM", api: "https://www.zumbofm.com/wp-json/wp/v2/posts?_embed", slug: "zumbo" },
    { name: "Jornal Desafio", api: "https://www.jornaldesafio.co.mz/wp-json/wp/v2/posts?_embed", slug: "desafio" },
    { name: "Jornal Notícias", api: "https://www.jornalnoticias.co.mz/wp-json/wp/v2/posts?_embed", slug: "noticias" },
    { name: "Diário Económico", api: "https://www.diarioeconomico.co.mz/wp-json/wp/v2/posts?_embed", slug: "diario" },
    { name: "CIP Moz", api: "https://www.cipmoz.org/wp-json/wp/v2/posts?_embed", slug: "cip" },
    { name: "Canal Moz", api: "https://canal.co.mz/wp-json/wp/v2/posts?_embed", slug: "canal" },
    { name: "Rádio Moçambique", api: "https://www.rm.co.mz/wp-json/wp/v2/posts?_embed", slug: "rm" },
    { name: "Miramar", api: "https://miramar.co.mz/wp-json/wp/v2/posts?_embed", slug: "miramar" },
    { name: "Times de Todos", api: "https://www.timesdetodos.com/wp-json/wp/v2/posts?_embed", slug: "timesdetodos" }
];

let allPosts = [], isFetching = false, currentCat = '';
let isSavedView = false, isLikedView = false;
let currentReadingPost = null;

// Gestor de paginação sequencial (Não trava o telemóvel)
let currentSourceIndex = 0;
let currentPage = 1;

// FUNÇÕES DE EXTRAÇÃO INTELIGENTE (Poupança de Dados e Rede)
function extractSnippet(html) {
    if (!html) return "Resumo não disponível.";
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const paragraphs = Array.from(doc.querySelectorAll('p')).map(p => p.textContent.trim()).filter(t => t.length > 30);
    let snippet = paragraphs.slice(0, 2).join('</p><p>');
    if (snippet) return `<p>${snippet}</p>`;
    // Se não houver <p>, corta o texto puro
    let rawText = doc.body.textContent || "";
    return rawText.substring(0, 300) + "...";
}

function extractDeepImage(p) {
    if (p._embedded && p._embedded['wp:featuredmedia'] && p._embedded['wp:featuredmedia'][0].source_url) return p._embedded['wp:featuredmedia'][0].source_url;
    // Procurar Lazy Load (data-src) escondido pelo WordPress
    if (p.content && p.content.rendered) {
        const doc = new DOMParser().parseFromString(p.content.rendered, 'text/html');
        const img = doc.querySelector('img');
        if (img) return img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.src;
    }
    return 'https://via.placeholder.com/600x300/e2e8f0/64748b?text=Sua+Notícia+365';
}

function extractWPCategories(p) {
    try {
        if (p._embedded && p._embedded['wp:term']) {
            return p._embedded['wp:term'][0].map(t => t.name.toLowerCase()).join(' ');
        }
    } catch(e){}
    return "";
}

function detectCategory(title, contentSnippet, wpCats) {
    const text = (title + " " + contentSnippet + " " + wpCats).toLowerCase();
    if (text.match(/política|governo|frelimo|renamo|mddm|eleições|parlamento|ministro|nyusi|presidente/)) return 'Política';
    if (text.match(/economia|banco|metical|inflação|mercado|empresas|impostos|finanças|investimento/)) return 'Economia';
    if (text.match(/desporto|futebol|mambas|moçambola|bola|campeonato|atleta|golo/)) return 'Desporto';
    if (text.match(/mundo|internacional|eua|ucrânia|rússia|gaza|onu/)) return 'Mundo';
    if (text.match(/sociedade|polícia|saúde|educação|crime|acidente|hospital|escola|sernic/)) return 'Sociedade';
    return 'Geral'; 
}

function timeAgo(dateString) {
    const date = new Date(dateString);
    const diffInMinutes = Math.floor((new Date() - date) / 60000);
    if (diffInMinutes < 60) return diffInMinutes < 2 ? "Agora mesmo" : `Há ${diffInMinutes} min`;
    const diffInHours = Math.floor(diffInMinutes / 60);
    if (diffInHours < 24) return `Há ${diffInHours}h`;
    return `Há ${Math.floor(diffInHours / 24)} dias`;
}

// Lógica de Carregamento Seguro
async function loadNews() {
    if (isFetching || isSavedView || isLikedView) return;
    isFetching = true;

    if (currentSourceIndex >= SOURCES.length) {
        currentSourceIndex = 0;
        currentPage++;
    }

    // Carrega apenas 2 jornais por vez para não estourar a RAM
    const sourcesToFetch = SOURCES.slice(currentSourceIndex, currentSourceIndex + 2);
    currentSourceIndex += 2;

    for (const src of sourcesToFetch) {
        try {
            const url = `${src.api}&per_page=4&page=${currentPage}`;
            const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
            if (!res.ok) continue;
            
            const data = await res.json();
            let added = false;
            
            data.forEach(p => {
                const uniqueId = `${src.slug}-${p.id}`;
                if (!allPosts.some(old => old.uniqueId === uniqueId)) {
                    const pubDate = p.date_gmt ? (p.date_gmt + 'Z') : p.date;
                    const snippet = extractSnippet(p.content?.rendered || "");
                    const wpCats = extractWPCategories(p);
                    
                    allPosts.push({
                        uniqueId, apiId: p.id, title: p.title.rendered, date: pubDate, 
                        srcName: src.name, link: p.link, img: extractDeepImage(p), 
                        snippet: snippet, // Guarda apenas o resumo!
                        detectedCat: detectCategory(p.title.rendered, snippet, wpCats)
                    });
                    added = true;
                }
            });
            if(added && !currentReadingPost) renderFeed();
        } catch(e) { console.log(`Erro ao carregar ${src.name} (Internet lenta ou bloqueio)`); }
    }
    
    isFetching = false;
}

function renderFeed() {
    const feed = document.getElementById('feed');
    let displayList = [...allPosts];
    
    if(isSavedView) displayList = JSON.parse(localStorage.getItem('news_saved') || '[]');
    else if(isLikedView) displayList = JSON.parse(localStorage.getItem('news_liked') || '[]');
    
    if(currentCat && !isSavedView && !isLikedView) {
        displayList = displayList.filter(p => p.detectedCat === currentCat);
    }
    
    displayList.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    feed.innerHTML = displayList.map(p => `
        <div class="news-card fade-in" onclick="openArticle('${p.uniqueId}')">
            <img class="news-img" src="${p.img}" loading="lazy">
            <div class="news-body">
                <div class="news-tags">
                    <span class="news-tag">${p.srcName}</span>
                    <span class="news-cat">${p.detectedCat}</span>
                </div>
                <h3 class="news-title">${p.title}</h3>
                <div class="news-snippet">${p.snippet.replace(/<[^>]*>?/gm, '')}</div>
                <div class="news-meta">
                    <span><i class="far fa-clock"></i> ${timeAgo(p.date)}</span>
                </div>
            </div>
        </div>
    `).join('');
    
    localInstantSearch();
}

function openArticle(id) {
    let post = allPosts.find(p => p.uniqueId === id) || 
               JSON.parse(localStorage.getItem('news_saved') || '[]').find(p => p.uniqueId === id) || 
               JSON.parse(localStorage.getItem('news_liked') || '[]').find(p => p.uniqueId === id);
    if (!post) return;
    
    currentReadingPost = post;
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('article-view').style.display = 'block';
    window.scrollTo(0, 0);

    document.getElementById('source-tag').innerText = post.srcName;
    document.getElementById('cat-tag').innerText = post.detectedCat;
    document.getElementById('article-title').innerHTML = post.title;
    
    const img = document.getElementById('feat-img');
    if (post.img && !post.img.includes('placeholder')) { img.src = post.img; img.style.display = 'block'; } 
    else { img.style.display = 'none'; }

    // Insere APENAS o resumo (poupa dados)
    document.getElementById('article-content').innerHTML = post.snippet;
    document.getElementById('official-link-btn').href = post.link;

    updateActionBtns();
}

function closeArticleView() {
    document.getElementById('article-view').style.display = 'none';
    document.getElementById('home-view').style.display = 'block';
    currentReadingPost = null;
    renderFeed();
}

// Gestão Inteligente de Favoritos
function toggleAction(type) {
    if(!currentReadingPost) return;
    const key = `news_${type}`; // 'news_saved' ou 'news_liked'
    let list = JSON.parse(localStorage.getItem(key) || '[]');
    const idx = list.findIndex(x => x.uniqueId === currentReadingPost.uniqueId);
    
    if(idx > -1) { list.splice(idx, 1); } 
    else { list.push(currentReadingPost); } // currentReadingPost já é leve agora!
    
    localStorage.setItem(key, JSON.stringify(list));
    updateActionBtns(); updateBadges();
}
function toggleSaveArticle() { toggleAction('saved'); }
function toggleLike() { toggleAction('liked'); }

function updateActionBtns() {
    if(!currentReadingPost) return;
    const isSaved = JSON.parse(localStorage.getItem('news_saved') || '[]').some(x => x.uniqueId === currentReadingPost.uniqueId);
    const isLiked = JSON.parse(localStorage.getItem('news_liked') || '[]').some(x => x.uniqueId === currentReadingPost.uniqueId);
    document.getElementById('btn-save').classList.toggle('saved', isSaved);
    document.getElementById('btn-like').classList.toggle('liked', isLiked);
}

function updateBadges() {
    document.getElementById('badge-saved').innerText = JSON.parse(localStorage.getItem('news_saved') || '[]').length;
    document.getElementById('badge-liked').innerText = JSON.parse(localStorage.getItem('news_liked') || '[]').length;
}

// Filtros e Utilidades
function filterCat(cat, btn) {
    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat; isSavedView = false; isLikedView = false;
    document.getElementById('scroll-anchor').style.display = 'block';
    renderFeed();
}

function toggleSavedView() { isSavedView = true; isLikedView = false; document.getElementById('scroll-anchor').style.display = 'none'; toggleSidebar(); renderFeed(); }
function toggleLikedView() { isLikedView = true; isSavedView = false; document.getElementById('scroll-anchor').style.display = 'none'; toggleSidebar(); renderFeed(); }
function goHomeForce() { isSavedView = false; isLikedView = false; currentCat = ''; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); document.querySelectorAll('.cat-item')[0].classList.add('active'); document.getElementById('scroll-anchor').style.display = 'block'; toggleSidebar(); closeArticleView(); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
function toggleTheme() { document.body.classList.toggle('dark-mode'); document.getElementById('theme-icon-top').className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon'; }
function localInstantSearch() { const query = document.getElementById('search-input').value.toLowerCase(); Array.from(document.getElementById('feed').children).forEach(c => { c.style.display = (c.innerText.toLowerCase().includes(query)) ? 'flex' : 'none'; }); }

window.onload = () => {
    updateBadges();
    const observer = new IntersectionObserver(e => {
        if(e[0].isIntersecting && !isSavedView && !isLikedView && !currentCat) loadNews();
    });
    observer.observe(document.getElementById('scroll-anchor'));
    loadNews();
};
</script>
